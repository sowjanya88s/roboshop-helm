apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: roboshop
  labels:
    project: roboshop
    env: dev
    component: mongodb 
spec:
  # modify replicas according to your case
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      project: roboshop
      env: dev
      component: mongodb
  template:
    metadata:
      labels:
        project: roboshop
        env: dev
        component: mongodb
    spec:
      containers:
      - name: mongodb
        image: "{{ .Values.deployment.imageName }}:{{ .Values.deployment.imageVersion }}"